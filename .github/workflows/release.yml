on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Perform release
permissions: {}

concurrency: # Avoid needlessly running the same workflow multiple times
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Perform release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the new release artefacts
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: 'false'

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: 'false' # Avoid potential cache poisoning - https://docs.zizmor.sh/audits/#cache-poisoning

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          args: release --clean
          version: v2.7.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
