on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Perform release
permissions: {}

concurrency: # Avoid needlessly running the same workflow multiple times
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Perform release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the new release artefacts
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: 'false'

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: 'false' # Avoid potential cache poisoning - https://docs.zizmor.sh/audits/#cache-poisoning

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean
          version: v2.7.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
